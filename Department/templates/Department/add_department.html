{% extends 'Department/base.html' %}

{% block content %}

<h2>{% if form.instance.pk %}Edit Department{% else %}Add Department{% endif %}</h2>

<form method="POST">
    {% csrf_token %}

    <div>
        {{ form.as_p }}
    </div>

    <button type="submit">Save</button>
    <a href="{% url 'department_list' %}">Cancel</a>

</form>

{% endblock %}
